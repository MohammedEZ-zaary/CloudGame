<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudGame Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div id="intro-overlay" class="intro-overlay">
        <div class="intro-logo-container">
            <div class="intro-glow"></div>
            <h1 class="intro-text">CloudGame</h1>
        </div>
    </div>
    <div class="game-background">
        <video autoplay muted loop playsinline class="background-video">
            <source src="../videos/background.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="title-bar">
        <div class="title">CLOUDGAME LOGIN</div>
        <div class="controls">
            <button id="minimize-btn" class="control-btn">−</button>
            <button id="maximize-btn" class="control-btn">□</button>
            <button id="close-btn" class="control-btn">×</button>
        </div>
    </div>
   
    <div class="login-container">
        <div class="login-box">
            <div id="form-section" class="form-section">
                <form id="loginForm">
                    <h2 style="color: #fff; margin-bottom: 25px; font-weight: 300; font-size: 1.5rem;">SIGN IN</h2>
                    
                    <div class="input-group">
                        <label for="email">MEGA EMAIL</label>
                        <input type="email" id="email" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">MEGA PASSWORD</label>
                        <input type="password" id="password" required>
                    </div>
                    
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    
                    <button type="submit" class="login-btn">Sign In</button>
                    
                    <div class="signup-link">
                        Don't have a MEGA account? <a href="https://mega.nz/register" target="_blank">Create a free account</a>
                    </div>
                </form>
            </div>

            <div class="logo-section">
                <div class="logo-container">
                    <h1>CloudGame</h1>
                    <p>Secure Cloud Saves for PC</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
